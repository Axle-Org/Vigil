services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: vigil-db
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vigil_db
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vigil-redis
    ports:
      - "6379:6379"

  # Scanner, Parser, etc. will be added as they are implemented
